services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: fastapi-app
    expose:
      - "8080"
    networks:
      - cloudflare
    restart: always

  cloudflared:
    build:
      context: .
      dockerfile: docker/Dockerfile.cloudflared
    container_name: cloudflared-tunnel
    restart: unless-stopped
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: ["--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
    networks:
      - cloudflare

networks:
  cloudflare:
    driver: bridge
