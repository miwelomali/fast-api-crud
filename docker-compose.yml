services:
  app:
    container_name: fastapi-app
    build:
      context: .
    expose:
      - "8080"
    networks:
      - cloudflare

  dagger:
    image: python:3.14-slim
    container_name: dagger-tests
    working_dir: /src
    volumes:
      - .:/src
    command: >
      sh -c "pip install -r requirements.txt &&
            pip install dagger-io pytest httpx &&
            python dagger/pipeline.py"
    networks:
    - cloudflare

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: fast-api-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}  
    command: tunnel --no-autoupdate run
    dns: 
      - 1.1.1.1
    networks:
      - cloudflare    
networks:
  cloudflare:
    driver: bridge

