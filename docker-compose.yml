services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: fastapi-app
    expose:
      - "8080"
    networks:
      - cloudflare

  dagger:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagger
    container_name: dagger-tests
    working_dir: /src
    volumes:
      - .:/src
    networks:
      - cloudflare

  cloudflared:
    build:
      context: .
      dockerfile: docker/Dockerfile.cloudflared
    container_name: cloudflared-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    dns: 
      - 1.1.1.1
    networks:
      - cloudflare 

networks:
  cloudflare:
    driver: bridge